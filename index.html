<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venyl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, sans-serif; background:#050505; }
    .app { display: flex; height: 100vh; min-height: 680px; background: #0a0a0a; overflow: hidden; color: white; }
    .sidebar { width: 240px; background: #000; display: flex; flex-direction: column; padding: 8px; flex-shrink: 0; }
    .sidebar-logo { padding: 16px 12px 20px; font-size: 24px; font-weight: 800; color: white; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#7c3aed; }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .logo-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: #b3b3b3; transition: all 0.15s; }
    .nav-item:hover, .nav-item.active { color: white; background: #1a1a1a; }
    .nav-item svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }
    .sidebar-divider { height: 0.5px; background: #2a2a2a; margin: 10px 8px; }
    .playlist-section { flex: 1; overflow-y: auto; }
    .playlist-title { padding: 8px 12px; font-size: 11px; color: #727272; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
    .playlist-item { padding: 8px 12px; font-size: 13px; color: #b3b3b3; cursor: pointer; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-item:hover { color: white; background: #1a1a1a; }
    .playlist-item.active-pl { color: #a855f7; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: linear-gradient(180deg, #2d164d 0%, transparent 100%); gap:16px; }
    .nav-arrows { display: flex; gap: 8px; }
    .arrow-btn { width: 28px; height: 28px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: white; }
    .arrow-btn svg { width: 14px; height: 14px; fill: white; }
    .search-bar { background: #1a1a1a; border: none; border-radius: 20px; padding: 10px 14px; color: white; font-size: 13px; width: 240px; outline: none; }
    .search-bar::placeholder { color: #727272; }
    .user-avatar { width: 34px; height: 34px; background: #282828; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; }
    .scroll-area { flex: 1; overflow-y: auto; padding: 0 24px 20px; }
    .notice { margin-top:20px; border:1px solid #31204a; background:#120d1d; color:#d7c4ff; padding:14px 16px; border-radius:10px; font-size:13px; line-height:1.45; }
    .notice code { background:#1d1330; padding:2px 6px; border-radius:6px; }
    .section-title { font-size: 20px; font-weight: 700; margin: 20px 0 14px; color: white; }
    .cards-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; margin-bottom: 24px; }
    .card { background: #181818; border-radius: 8px; padding: 14px; cursor: pointer; transition: background 0.2s; position: relative; }
    .card:hover { background: #282828; }
    .card-img { width: 100%; aspect-ratio: 1; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .card-name { font-size: 13px; font-weight: 600; color: white; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-desc { font-size: 11px; color: #727272; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-play { width: 42px; height: 42px; background: #a855f7; border-radius: 50%; position: absolute; bottom: 48px; right: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s, transform 0.2s; transform: translateY(4px); cursor: pointer; border: none; }
    .card:hover .card-play { opacity: 1; transform: translateY(0); }
    .card-play svg { width: 16px; height: 16px; fill: black; margin-left: 2px; }
    .tracklist { background: #181818; border-radius: 8px; overflow: hidden; }
    .track-header { display: grid; grid-template-columns: 32px 1.4fr 1fr 60px; gap: 8px; padding: 8px 16px; border-bottom: 0.5px solid #2a2a2a; font-size: 11px; color: #727272; text-transform: uppercase; letter-spacing: 0.5px; }
    .track-row { display: grid; grid-template-columns: 32px 1.4fr 1fr 60px; gap: 8px; padding: 8px 16px; align-items: center; cursor: pointer; border-radius: 4px; margin: 2px 8px; }
    .track-row:hover { background: #282828; }
    .track-row.playing { color: #a855f7; }
    .track-num { font-size: 13px; color: #727272; text-align: center; }
    .track-row.playing .track-num { color: #a855f7; }
    .track-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .track-thumb { width: 36px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .track-name { font-size: 14px; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: #727272; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-row.playing .track-name { color: #c084fc; }
    .track-album { font-size: 13px; color: #727272; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-duration { font-size: 13px; color: #727272; text-align: right; }
    .player { background: #181818; border-top: 0.5px solid #2a2a2a; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .player-info { display: flex; align-items: center; gap: 12px; width: 260px; flex-shrink: 0; }
    .player-thumb { width: 48px; height: 48px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .player-track { min-width: 0; }
    .player-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 11px; color: #727272; }
    .heart-btn { background: none; border: none; cursor: pointer; color: #727272; padding: 4px; }
    .heart-btn.liked { color: #a855f7; }
    .heart-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .controls { display: flex; align-items: center; gap: 16px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; color: #b3b3b3; padding: 4px; transition: color 0.15s; }
    .ctrl-btn:hover { color: white; }
    .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .play-btn { width: 36px; height: 36px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: transform 0.1s; }
    .play-btn:hover { transform: scale(1.06); }
    .play-btn svg { width: 14px; height: 14px; fill: black; }
    .play-btn .pause-icon { display: none; }
    .play-btn.playing .play-icon { display: none; }
    .play-btn.playing .pause-icon { display: block; }
    .progress-bar { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 620px; }
    .time { font-size: 11px; color: #727272; min-width: 30px; }
    .time.right { text-align: right; }
    .bar-track { flex: 1; height: 4px; background: #4a4a4a; border-radius: 2px; cursor: pointer; position: relative; }
    .bar-fill { height: 100%; background: white; border-radius: 2px; }
    .bar-track:hover .bar-fill { background: #a855f7; }
    .player-right { width: 180px; display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
    .vol-icon { color: #b3b3b3; }
    .vol-icon svg { width: 16px; height: 16px; fill: currentColor; }
    .vol-bar { width: 90px; height: 4px; background: #4a4a4a; border-radius: 2px; cursor: pointer; position:relative; }
    .vol-fill { height: 100%; width: 70%; background: white; border-radius: 2px; }
    .vol-bar:hover .vol-fill { background: #a855f7; }
    .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .eq-bar { width: 3px; background: #a855f7; border-radius: 1px; animation: eq 0.6s ease-in-out infinite alternate; }
    .eq-bar:nth-child(2) { animation-delay: 0.15s; }
    .eq-bar:nth-child(3) { animation-delay: 0.3s; }
    .status-line { margin-top:12px; color:#a1a1aa; font-size:12px; min-height:16px; }
    .status-line.error { color:#fca5a5; }
    @keyframes eq { from { height: 4px; } to { height: 14px; } }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <img src="assets/venyl_logo.png" alt="Venyl logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="logo-fallback" style="display:none;">💿</div>
      </div>
      Venyl
    </div>
    <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Главная</div>
    <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Поиск</div>
    <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Медиатека</div>
    <div class="sidebar-divider"></div>
    <div class="playlist-title">Плейлисты</div>
    <div class="playlist-section">
      <div class="playlist-item active-pl">Демо плейлист</div>
      <div class="playlist-item">Твои треки</div>
      <div class="playlist-item">Для друга</div>
      <div class="playlist-item">Совместное прослушивание</div>
    </div>
  </div>
  <div class="main-content">
    <div class="top-bar">
      <div class="nav-arrows">
        <button class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg></button>
        <button class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></button>
      </div>
      <input class="search-bar" placeholder="Поиск..." />
      <div class="user-avatar">ВЫ</div>
    </div>
    <div class="scroll-area">
      <div class="section-title">Твои треки</div>
      <div class="cards-grid">
        <div class="card" onclick="selectTrack(0)"><div class="card-img" style="background:#2d164d;">🥔</div><div class="card-name">Чипсовий Йосипович</div><div class="card-desc">Локальный трек</div><button class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button></div>
        <div class="card" onclick="selectTrack(1)"><div class="card-img" style="background:#3b235e;">🎤</div><div class="card-name">Тупа пизда</div><div class="card-desc">Локальный трек</div><button class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button></div>
        <div class="card" onclick="selectTrack(2)"><div class="card-img" style="background:#4d2a72;">💀</div><div class="card-name">Я убил Мыган</div><div class="card-desc">Lil Bronik</div><button class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button></div>
      </div>
      <div class="section-title">Треки</div>
      <div class="tracklist">
        <div class="track-header"><div>#</div><div>Название</div><div>Альбом</div><div style="text-align:right;">Время</div></div>
        <div id="tracklistBody"></div>
      </div>
      <div id="statusLine" class="status-line"></div>
    </div>
    <div class="player">
      <div class="player-info">
        <div class="player-thumb" id="playerThumb" style="background:#2d164d;">💿</div>
        <div class="player-track"><div class="player-name" id="playerName">Выбери трек</div><div class="player-artist" id="playerArtist">Venyl</div></div>
        <button class="heart-btn" id="heartBtn" onclick="toggleLike()"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
      </div>
      <div class="player-center">
        <div class="controls">
          <button class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 8.46 20 10.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
          <button class="ctrl-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button class="play-btn" id="playBtn" onclick="togglePlay()"><svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
          <button class="ctrl-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
          <button class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>
        <div class="progress-bar"><span class="time" id="timeCurrent">0:00</span><div class="bar-track" id="progressTrack" onclick="seek(event)"><div class="bar-fill" id="progressFill" style="width:0%"></div></div><span class="time right" id="timeTotal">0:00</span></div>
      </div>
      <div class="player-right">
        <div class="vol-icon"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
        <div class="vol-bar" onclick="setVolume(event)"><div class="vol-fill" id="volFill"></div></div>
      </div>
    </div>
  </div>
</div>
<audio id="audio"></audio>
<script>
const tracks = [
  { name: "Чипсовий Йосипович", artist: "Unknown Artist", album: "Venyl Session", emoji: "🥔", bg: "#2d164d", file: "music/track1.mp3" },
  { name: "Тупа пизда", artist: "Unknown Artist", album: "Venyl Session", emoji: "🎤", bg: "#3b235e", file: "music/track2.mp3" },
  { name: "Я убил Мыган", artist: "Lil Bronik", album: "Venyl Session", emoji: "💀", bg: "#4d2a72", file: "music/track3.mp3" }
];
let currentTrack = 0;
let liked = new Set();
let volume = 0.7;
const audio = document.getElementById('audio');
audio.volume = volume;
function formatTime(seconds){ if(!Number.isFinite(seconds)) return "0:00"; const mins=Math.floor(seconds/60); const secs=Math.floor(seconds%60); return `${mins}:${String(secs).padStart(2,'0')}`; }
function setStatus(message="", isError=false){ const line=document.getElementById('statusLine'); line.textContent=message; line.classList.toggle('error', isError); }
function renderTracks(){ const body=document.getElementById('tracklistBody'); body.innerHTML=tracks.map((t,i)=>`<div class="track-row ${i===currentTrack && !audio.paused ? 'playing' : ''}" onclick="selectTrack(${i})"><div class="track-num">${i===currentTrack && !audio.paused ? '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>' : i+1}</div><div class="track-info"><div class="track-thumb" style="background:${t.bg}">${t.emoji}</div><div><div class="track-name">${t.name}</div><div class="track-artist">${t.artist}</div></div></div><div class="track-album">${t.album}</div><div class="track-duration">${formatTime(t.durationSec)}</div></div>`).join(''); }
function loadTrack(idx, autoplay=false){ currentTrack=idx; const t=tracks[idx]; audio.src=t.file; document.getElementById('playerThumb').textContent=t.emoji; document.getElementById('playerThumb').style.background=t.bg; document.getElementById('playerName').textContent=t.name; document.getElementById('playerArtist').textContent=t.artist; document.getElementById('timeCurrent').textContent='0:00'; document.getElementById('timeTotal').textContent=t.durationSec ? formatTime(t.durationSec) : '0:00'; document.getElementById('progressFill').style.width='0%'; document.getElementById('heartBtn').classList.toggle('liked', liked.has(idx)); document.getElementById('playBtn').classList.remove('playing'); setStatus(`Выбран файл: ${t.file}`); renderTracks(); if(autoplay) playCurrent(); }
async function playCurrent(){ try{ await audio.play(); document.getElementById('playBtn').classList.add('playing'); setStatus(`Сейчас играет: ${tracks[currentTrack].name}`); renderTracks(); } catch(error){ setStatus(`Не удалось запустить ${tracks[currentTrack].file}. Проверь, что файл лежит в папке music/.`, true); } }
function selectTrack(idx){ loadTrack(idx, true); }
function togglePlay(){ if(!audio.src){ loadTrack(currentTrack, true); return; } if(audio.paused){ playCurrent(); } else { audio.pause(); document.getElementById('playBtn').classList.remove('playing'); setStatus(`Пауза: ${tracks[currentTrack].name}`); renderTracks(); } }
function prevTrack(){ loadTrack((currentTrack-1+tracks.length)%tracks.length, true); }
function nextTrack(){ loadTrack((currentTrack+1)%tracks.length, true); }
function seek(e){ if(!audio.duration) return; const rect=e.currentTarget.getBoundingClientRect(); const pct=Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width)); audio.currentTime=pct*audio.duration; }
function toggleLike(){ if(liked.has(currentTrack)) liked.delete(currentTrack); else liked.add(currentTrack); document.getElementById('heartBtn').classList.toggle('liked', liked.has(currentTrack)); }
function setVolume(e){ const rect=e.currentTarget.getBoundingClientRect(); volume=Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width)); audio.volume=volume; document.getElementById('volFill').style.width=`${volume*100}%`; }
audio.addEventListener('timeupdate', ()=>{ const cur=audio.currentTime||0; const total=audio.duration||0; document.getElementById('timeCurrent').textContent=formatTime(cur); document.getElementById('timeTotal').textContent=formatTime(total); document.getElementById('progressFill').style.width=`${total ? (cur/total)*100 : 0}%`; });
audio.addEventListener('loadedmetadata', ()=>{ tracks[currentTrack].durationSec=audio.duration; document.getElementById('timeTotal').textContent=formatTime(audio.duration); renderTracks(); });
audio.addEventListener('ended', ()=>nextTrack());
audio.addEventListener('error', ()=>{ setStatus(`Файл ${tracks[currentTrack].file} не найден. Добавь его в папку music/ и заново залей на GitHub.`, true); document.getElementById('playBtn').classList.remove('playing'); renderTracks(); });
document.getElementById('volFill').style.width = `${volume * 100}%`;
loadTrack(0, false);
renderTracks();
</script>
</body>
</html>
